run:
  timeout: 5m
  skip-dirs:
    - web/
    - vendor/

linters:
  enable:
    - gofmt
    - goimports
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - structcheck
    - varcheck
    - ineffassign
    - deadcode
    - typecheck
    - bodyclose
    - noctx
    - rowserrcheck
    - sqlclosecheck
    - misspell
    - gosec
    - asciicheck
    - exportloopref
    - reassign
    - tenv

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/AnubisWatch/anubiswatch
  govet:
    check-shadowing: true
    enable-all: true
    disable:
      - fieldalignment
  misspell:
    locale: US
  gocyclo:
    min-complexity: 15
  cyclop:
    max-complexity: 15
    package-average: 10
  funlen:
    lines: 100
    statements: 50
  gocognit:
    min-complexity: 20

issues:
  exclude-use-default: false
  max-issues-per-linter: 50
  max-same-issues: 10
  exclude:
    - "Error return value of .((os\\.)?std(out|err)\\..*|.*Close|.*Flush|os\\.Remove(All)?|.*printf?|os\\.(Un)?Setenv). is not checked"
    - "G104: Errors unhandled"
    - "exported (type|method|function) (.+) should have comment or be unexported"
    - "ST1000: at least one file in a package should have a package comment"
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - funlen
        - cyclop
        - gocognit
    - path: internal/core/
      linters:
        - deadcode
        - unused
